<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toyota RAV4 - American Road Adventure</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Start / Lobby Screen -->
        <div id="start-screen" class="overlay">
            <div class="glass-card">
                <div class="logo-area">
                    <span class="badge">ADVENTURE GAME</span>
                    <h1>RAV4 ROAD TRIP</h1>
                </div>
                <p class="description">
                    미국의 끝없는 대자연을 달리며 장애물을 피하세요!<br>
                    귀여운 동물들과 바위, 그리고 거대한 미국식 트럭을 피해 안전하게 드라이브를 완수하세요.
                </p>
                <div class="instructions">
                    <div class="instruction-item">
                        <span class="key">◀</span> <span class="key">▶</span> 또는 화면 아래 <span>버튼</span>으로 차선 변경
                    </div>
                </div>
                <button id="start-btn" class="btn-primary">드라이브 시작하기</button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-screen" class="overlay hidden">
            <div class="glass-card">
                <h2>GAME OVER</h2>
                <div class="score-display">
                    <p>최종 주행 거리</p>
                    <span id="final-score">0</span><span class="unit"> km</span>
                </div>
                <button id="restart-btn" class="btn-primary">다시 도전하기</button>
            </div>
        </div>

        <!-- HUD (Heads-Up Display) -->
        <div id="hud" class="hidden">
            <div class="hud-item score-box">
                <span class="label">DISTANCE</span>
                <span class="value" id="score-val">0.0 km</span>
            </div>
            <div class="hud-item hp-box">
                <span class="label">RAV4 HP</span>
                <div class="hp-bar-container">
                    <div id="hp-bar"></div>
                </div>
            </div>
            <div class="hud-item speed-box">
                <span class="label">SPEED</span>
                <span class="value" id="speed-val">100 km/h</span>
            </div>
        </div>

        <!-- Warning Banner -->
        <div id="warning-banner" class="hidden"></div>

        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- On-Screen Controllers -->
        <div id="controls" class="hidden">
            <button id="left-btn" class="control-btn" aria-label="Move Left">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button id="right-btn" class="control-btn" aria-label="Move Right">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Game Logic -->
    <script src="game.js"></script>
</body>
</html>
